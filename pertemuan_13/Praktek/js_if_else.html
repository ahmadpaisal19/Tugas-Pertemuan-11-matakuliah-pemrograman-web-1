<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IF ELSE</title>
</head>
<body>
    <h1>IF ELSE</h1>
    <p>Masukkan angka untuk mengetahui apakah itu bilangan genap atau ganjil:</p>
    <input type="number" id="numberInput">
    <button onclick="checkEvenOdd()">Cek Genap/Ganjil</button>
    <p id="result"></p>

    <script>
        function checkEvenOdd() {
            const numberInput = document.getElementById('numberInput').value;
            let result;

            if (numberInput % 2 === 0) {
                result = numberInput + ' adalah bilangan genap.';
            } else {
                result = numberInput + ' adalah bilangan ganjil.';
            }

            document.getElementById('result').textContent = result;
        }
    </script>
    
</body>
</html>
