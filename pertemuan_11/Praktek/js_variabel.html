<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARIABEL</title>
</head>
<body>
    <script>
        // Operator Perbandingan
        let a = 10;
        let b = 5;
        console.log("Apakah a sama dengan b? " + (a == b)); // Output: false
        console.log("Apakah a tidak sama dengan b? " + (a != b)); // Output: true
        console.log("Apakah a lebih besar dari b? " + (a > b)); // Output: true
        console.log("Apakah a lebih kecil dari b? " + (a < b)); // Output: false
        console.log("Apakah a lebih besar atau sama dengan b? " + (a >= b)); // Output: true
        console.log("Apakah a lebih kecil atau sama dengan b? " + (a <= b)); // Output: false
    </script>
</body>
</html>
